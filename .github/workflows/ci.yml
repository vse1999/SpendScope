name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Deployment policy check
        env:
          NEXTAUTH_URL: https://ci.example.com
          APP_URL: https://ci.example.com
          NEXTAUTH_SECRET: ci-example-secret
          GOOGLE_CLIENT_ID: ci-google.apps.googleusercontent.com
          GOOGLE_CLIENT_SECRET: ci-google-secret
          GITHUB_CLIENT_ID: ci-github-client
          GITHUB_CLIENT_SECRET: ci-github-secret
          NEXT_PUBLIC_ENABLE_BILLING: "false"
          ALLOW_LIVE_STRIPE_KEYS: "false"
          ENABLE_TEST_ENDPOINTS: "false"
          E2E_LOGIN_BYPASS: "false"
          ALLOW_BILLING_RESET: "false"
          NEXT_PUBLIC_ALLOW_BILLING_RESET: "false"
          UPSTASH_REDIS_REST_URL: https://ci.upstash.example
          UPSTASH_REDIS_REST_TOKEN: ci-token
          SENTRY_DSN: https://ci@example.ingest.sentry.io/123
          NEXT_PUBLIC_SENTRY_DSN: https://ci@example.ingest.sentry.io/123
          SENTRY_SEND_DEFAULT_PII: "false"
        run: npm run deploy:check

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Security audit (production deps)
        run: npm run audit:prod

      - name: Check explicit any regressions
        run: npm run check:any

      - name: Test (coverage gate)
        run: npm run test:ci

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage
          if-no-files-found: ignore

      - name: Build
        run: npm run build
