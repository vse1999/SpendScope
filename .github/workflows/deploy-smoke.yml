name: Deploy Smoke Checks

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: "Deployed app URL (for example: https://app.example.com)"
        required: true
        type: string
      use_test_login:
        description: "Run authenticated checks via /api/test-login"
        required: false
        default: false
        type: boolean

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run deploy smoke checks
        env:
          SMOKE_BASE_URL: ${{ inputs.base_url }}
          SMOKE_USE_TEST_LOGIN: ${{ inputs.use_test_login }}
          SMOKE_E2E_TOKEN: ${{ secrets.SMOKE_E2E_TOKEN }}
        run: npm run smoke:deploy

