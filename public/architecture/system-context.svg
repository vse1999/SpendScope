<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="860" viewBox="0 0 1400 860">
  <defs>
    <style>
      .title { font: 700 28px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 500 16px 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .node { rx: 16; ry: 16; stroke-width: 2; }
      .label { font: 600 18px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .small { font: 500 14px 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .line { stroke: #1e293b; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .muted { stroke: #64748b; stroke-dasharray: 8 8; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1e293b" />
    </marker>
  </defs>

  <rect width="1400" height="860" fill="#f8fafc" />
  <text x="60" y="58" class="title">SpendScope System Context</text>
  <text x="60" y="88" class="subtitle">Auth boundary, tenant context resolution, read-model cache tags, and Stripe webhook idempotency</text>

  <rect x="80" y="180" width="260" height="130" class="node" fill="#dbeafe" stroke="#3b82f6" />
  <text x="110" y="230" class="label">Browser Client</text>
  <text x="110" y="256" class="small">Dashboard + Expense UI</text>
  <text x="110" y="280" class="small">Role-aware navigation</text>

  <rect x="420" y="130" width="300" height="150" class="node" fill="#dcfce7" stroke="#16a34a" />
  <text x="450" y="180" class="label">Next.js App Router</text>
  <text x="450" y="206" class="small">Route handlers + server actions</text>
  <text x="450" y="230" class="small">`proxy.ts` guard boundary</text>

  <rect x="420" y="330" width="300" height="150" class="node" fill="#e0f2fe" stroke="#0284c7" />
  <text x="450" y="380" class="label">Auth / Tenant Context</text>
  <text x="450" y="406" class="small">NextAuth session + role checks</text>
  <text x="450" y="430" class="small">Company resolution from DB</text>

  <rect x="420" y="530" width="300" height="170" class="node" fill="#fef3c7" stroke="#d97706" />
  <text x="450" y="582" class="label">Read Models + Cache Tags</text>
  <text x="450" y="608" class="small">`company:{id}:dashboard`</text>
  <text x="450" y="632" class="small">Explicit invalidation on writes</text>
  <text x="450" y="656" class="small">Consistency after mutations</text>

  <rect x="830" y="220" width="280" height="170" class="node" fill="#ede9fe" stroke="#7c3aed" />
  <text x="860" y="275" class="label">Neon Postgres</text>
  <text x="860" y="301" class="small">Multi-tenant data model</text>
  <text x="860" y="325" class="small">Expenses, categories, billing</text>
  <text x="860" y="349" class="small">Webhook event ledger</text>

  <rect x="1170" y="240" width="190" height="150" class="node" fill="#fee2e2" stroke="#dc2626" />
  <text x="1200" y="292" class="label">Stripe</text>
  <text x="1200" y="318" class="small">Checkout / Portal</text>
  <text x="1200" y="342" class="small">Signed webhooks</text>

  <rect x="830" y="520" width="530" height="160" class="node" fill="#f1f5f9" stroke="#475569" />
  <text x="860" y="572" class="label">Operational Controls</text>
  <text x="860" y="598" class="small">CI quality gates, deployment policy checks, environment toggles, smoke checks</text>
  <text x="860" y="622" class="small">Failure handling: webhook idempotency and cache revalidation ownership</text>

  <path class="line" d="M 340 245 L 420 205" />
  <path class="line" d="M 560 280 L 560 330" />
  <path class="line" d="M 560 480 L 560 530" />
  <path class="line" d="M 720 205 L 830 280" />
  <path class="line" d="M 1110 300 L 1170 315" />
  <path class="line" d="M 1170 350 L 1110 360" />
  <path class="line" d="M 720 620 L 830 600" />
  <path class="line muted" d="M 560 605 L 560 700 L 965 700 L 965 680" />

  <text x="354" y="228" class="small">HTTPS</text>
  <text x="741" y="254" class="small">Prisma</text>
  <text x="1135" y="286" class="small">API calls</text>
  <text x="1120" y="377" class="small">Webhook events</text>
</svg>
